<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maintenance Mode | FURAB SYSTEM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="maintenance-container">
        <div class="card">
            <div class="icon-wrapper">
                <i class="fas fa-tools main-icon"></i>
                <i class="fas fa-cog gear-1"></i>
                <i class="fas fa-cog gear-2"></i>
            </div>
            
            <h1>Under Maintenance</h1>
            <div class="badge">
                <i class="fas fa-sync-alt"></i> System Upgrade in Progress
            </div>
            
            <p class="description">
                Kami sedang melakukan peningkatan sistem untuk memberikan pengalaman terbaik.<br>
                Mohon bersabar, website akan segera kembali.
            </p>
            
            <div class="timer-container">
                <div class="timer-title">
                    <i class="fas fa-clock"></i> ESTIMATED REMAINING TIME
                </div>
                <div class="countdown" id="countdown">
                    <div class="time-box">
                        <div class="time-number" id="days">00</div>
                        <div class="time-label">Days</div>
                    </div>
                    <div class="time-box">
                        <div class="time-number" id="hours">00</div>
                        <div class="time-label">Hours</div>
                    </div>
                    <div class="time-box">
                        <div class="time-number" id="minutes">00</div>
                        <div class="time-label">Minutes</div>
                    </div>
                    <div class="time-box">
                        <div class="time-number" id="seconds">00</div>
                        <div class="time-label">Seconds</div>
                    </div>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-label">
                    <span><i class="fas fa-database"></i> Maintenance Progress</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            
            <div class="social-links">
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-link"><i class="fab fa-discord"></i></a>
                <a href="#" class="social-link"><i class="fab fa-telegram"></i></a>
            </div>
            
            <form class="notify-form" id="notifyForm">
                <input type="email" class="notify-input" placeholder="Masukkan email untuk notifikasi" required>
                <button type="submit" class="notify-btn">
                    <i class="fas fa-bell"></i> Notify Me
                </button>
            </form>
            
            <div class="footer">
                <i class="fas fa-heart" style="color: #8e44ad;"></i> FURAB SYSTEM | We'll be back soon
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
